<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ভোটার তথ্য সার্চ</title>
</head>
<body>

<h2>ভোটার তথ্য সার্চ</h2>
<input type="file" id="pdf" accept=".pdf">
<br><br>
<input id="q" placeholder="নাম লিখুন">
<button onclick="searchData()">সার্চ</button>

<hr>

<div id="out"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>
<script>
let data = [];

fetch("data.json")
.then(res => res.json())
.then(json => {
  data = json;
})
.catch(err => {
  document.getElementById("out").innerHTML =
  "data.json লোড হয়নি";
});

function searchData() {

let txt = "";

document.getElementById("pdf").onchange = async (e) => {
  try {
    const file = e.target.files[0];

    const pdf = await pdfjsLib.getDocument({
      data: await file.arrayBuffer()
    }).promise;

    txt = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();

      txt += content.items.map(x => x.str).join(" ") + "\n";
    }

    document.getElementById("out").innerHTML =
      "PDF আপলোড হয়েছে ✅";

  } catch (err) {
    document.getElementById("out").innerHTML =
      "PDF পড়া যায়নি";
  }
};

function go() {

  let q = document.getElementById("q").value.trim();

  if (!txt) {
    document.getElementById("out").innerHTML =
      "আগে PDF আপলোড করুন";
    return;
  }

  let pos = txt.toLowerCase().indexOf(q.toLowerCase());

  if (pos === -1) {
    document.getElementById("out").innerHTML =
      "কিছু পাওয়া যায়নি";
    return;
  }

  let result = txt.substring(
    Math.max(0, pos - 300),
    Math.min(txt.length, pos + 1200)
  );

  document.getElementById("out").innerHTML =
    `<pre style="white-space:pre-wrap">${result}</pre>`;
}
</script>

</body>
</html>
