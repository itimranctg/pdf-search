<!DOCTYPE html>
<html lang="bn">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>PDF Search</title>

<style>
body{
  font-family: Arial, sans-serif;
  padding:20px;
}

input,button{
  padding:10px;
  margin:5px 0;
}

#out{
  margin-top:15px;
  padding:10px;
  border:1px solid #ccc;
  border-radius:8px;
}
</style>
</head>
<body>

<h2>PDF Upload + Name Search</h2>

<input type="file" id="pdf" accept=".pdf">
<br><br>

<input type="text" id="q" placeholder="নাম লিখুন">
<button onclick="go()">সার্চ</button>

<div id="out">আগে PDF আপলোড করুন</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>

<script>

let txt = "";

document.getElementById("pdf").onchange = async (e) => {

  try{

    document.getElementById("out").innerText = "লোড হচ্ছে...";

    const file = e.target.files[0];

    const pdf = await pdfjsLib.getDocument({
      data: await file.arrayBuffer()
    }).promise;

    txt = "";

    for(let i=1;i<=pdf.numPages;i++){

      const page = await pdf.getPage(i);

      const content = await page.getTextContent();

      txt += content.items.map(x => x.str).join(" ") + "\n";
    }

    document.getElementById("out").innerText =
    "PDF আপলোড হয়েছে ✅";

  }
  catch(err){

    document.getElementById("out").innerText =
    "PDF পড়া যায়নি: " + err.message;

  }

};
function go(){

  const q = document.getElementById("q").value.trim();

  if(!txt){
    out.innerText = "আগে PDF আপলোড করুন";
    return;
  }

  const lines = txt.split("\n");

  let found = [];

  for(let i=0;i<lines.length;i++){

    if(lines[i].toLowerCase().includes(q.toLowerCase())){

      let rec = lines.slice(
        Math.max(0,i-1),
        Math.min(lines.length,i+8)
      ).join("\n");

      found.push(rec);
    }
  }

  if(found.length===0){
    out.innerText = "কিছু পাওয়া যায়নি";
    return;
  }

  out.innerHTML = found.map(x=>`
    <div style="
      border:1px solid #ccc;
      padding:10px;
      margin:10px 0;
      border-radius:8px">
      <pre style="white-space:pre-wrap">${x}</pre>
    </div>
  `).join("");

}


</script>

</body>
</html>
