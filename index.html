<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>ভোটার সার্চ</title>
</head>
<body>

<h2>ভোটার তথ্য সার্চ</h2>

<input id="q" placeholder="নাম লিখুন">
<button onclick="searchData()">সার্চ</button>

<div id="out"></div>

<script>
let data = [];

fetch("data.json")
.then(res => res.json())
.then(json => data = json);

function searchData() {

  let q = document.getElementById("q").value.toLowerCase();

  let found = data.find(item =>
    item.name.toLowerCase().includes(q)
  );

  if(!found){
    document.getElementById("out").innerHTML =
    "কোন তথ্য পাওয়া যায়নি";
    return;
  }

  document.getElementById("out").innerHTML = `
    <h3>${found.name}</h3>
    <p><b>ভোটার নম্বর:</b> ${found.voter_no}</p>
    <p><b>পিতা:</b> ${found.father}</p>
    <p><b>মাতা:</b> ${found.mother}</p>
    <p><b>জন্ম তারিখ:</b> ${found.birth_date}</p>
    <p><b>ঠিকানা:</b> ${found.address}</p>
  `;
}
</script>

</body>
</html>
